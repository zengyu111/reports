<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#02070d" />
    <meta
      name="description"
      content="在三维宇宙中探索《道德经》八十一章与《庄子》三十三篇。"
    />
    <link rel="icon" href="data:," />
    <title>道德经宇宙</title>
    <script type="module" crossorigin src="/reports/tao-live/assets/index-CKZJYGeI.js"></script>
    <link rel="stylesheet" crossorigin href="/reports/tao-live/assets/index-CMDrGy3U.css">
  </head>
  <body>
    <main id="app">
      <canvas id="universe" aria-label="道德经与庄子三维宇宙"></canvas>

      <header class="masthead">
        <h1>道德经宇宙</h1>
        <p class="chapter-status sr-only" id="chapter-status">八十一章正在就位</p>
      </header>

      <section class="explorer" aria-label="章节探索工具">
        <form class="search" id="search-form" role="search">
          <label class="sr-only" for="chapter-search">搜索章节</label>
          <span aria-hidden="true">⌕</span>
          <input
            id="chapter-search"
            name="query"
            type="search"
            placeholder="搜索章数、标题或句子"
            autocomplete="off"
          />
        </form>
        <div class="search-results" id="search-results" role="listbox" hidden></div>

        <div class="explorer__actions">
          <div class="domain-switch" aria-label="切换星域">
            <button class="is-active" type="button" data-domain="全部">全部</button>
            <button type="button" data-domain="道经">道经</button>
            <button type="button" data-domain="德经">德经</button>
            <button type="button" data-domain="庄子">庄子</button>
          </div>
          <button class="reset-button" id="reset-view" type="button">重置</button>
        </div>
      </section>

      <aside class="chapter-card" id="chapter-card" aria-live="polite" hidden>
        <div class="chapter-card__meta">
          <span id="card-number">第一章</span>
          <span id="card-domain">道经</span>
        </div>
        <div class="chapter-card__heading">
          <h2 id="card-title">众妙之门</h2>
          <button id="return-view" type="button" hidden>返回宇宙</button>
        </div>
        <nav class="chapter-tabs" id="chapter-tabs" aria-label="篇章内容层次">
          <button class="is-active" type="button" data-card-layer="original">原文</button>
          <button type="button" data-card-layer="annotation">注释</button>
          <button type="button" data-card-layer="allusion">典故</button>
          <button type="button" data-card-layer="insight">启示</button>
        </nav>
        <div class="chapter-layer is-active" data-layer-panel="original">
          <p class="chapter-card__original" id="card-original"></p>
        </div>
        <div class="chapter-layer" data-layer-panel="annotation" hidden>
          <small class="chapter-layer__source" id="card-annotation-source"></small>
          <p id="card-annotation-summary"></p>
          <dl class="chapter-keywords" id="card-keywords"></dl>
          <div class="chapter-classical-notes" id="card-classical-notes"></div>
        </div>
        <div class="chapter-layer" data-layer-panel="allusion" hidden>
          <small class="chapter-layer__source" id="card-allusion-source"></small>
          <h3 id="card-allusion-title"></h3>
          <p id="card-allusion-text"></p>
        </div>
        <div class="chapter-layer" data-layer-panel="insight" hidden>
          <div class="chapter-insights" id="card-insights"></div>
        </div>
        <small id="card-hint">点击星辰进入本篇</small>
      </aside>
      <div class="core-hint" id="core-hint" hidden>道 · 随缘一页</div>

      <div class="loading" id="loading">
        <div class="loading__halo"></div>
        <p>宇宙正在成形</p>
      </div>

      <noscript>请启用 JavaScript 以浏览道德经宇宙。</noscript>
    </main>
  </body>
</html>
